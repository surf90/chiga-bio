<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 安全背景（水色の円） -->
  <circle cx="50" cy="50" r="44" fill="#E0F4FF" stroke="#4AB8E8" stroke-width="2"/>
  <!-- クラゲの傘（半球形・半透明） -->
  <ellipse cx="50" cy="44" rx="26" ry="18" fill="#B8E0F0" stroke="#4AB8E8" stroke-width="2" opacity="0.85"/>
