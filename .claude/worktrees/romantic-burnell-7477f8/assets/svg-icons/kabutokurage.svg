<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 安全背景（水色の円） -->
  <circle cx="50" cy="50" r="44" fill="#E0F4FF" stroke="#4AB8E8" stroke-width="2"/>
  <!-- カブトクラゲの長円形体（半透明） -->
  <ellipse cx="50" cy="50" rx="14" ry="24" fill="#C8E8F0" stroke="#4AB8E8" stroke-width="1.5" opacity="0.8"/>
  <!-- 口部（底部の大きい開口部） -->
  <ellipse cx="50" cy="72" rx="10" ry="5" fill="#A8D0E0" opacity="0.6"/>
  <!-- 櫛板（光を反射して虹色にキラキラ光る） -->
  <line x1="36" y1="30" x2="36" y2="70" stroke="#7FD4F0" stroke-width="1.5" opacity="0.8"/>
  <line x1="39" y1="28" x2="39" y2="72" stroke="#A0C4FF" stroke-width="1.5" opacity="0.8"/>
  <line x1="61" y1="28" x2="61" y2="72" stroke="#7FD4F0" stroke-width="1.5" opacity="0.8"/>
  <line x1="64" y1="30" x2="64" y2="70" stroke="#A0C4FF" stroke-width="1.5" opacity="0.8"/>
  <!-- 虹色のライン（グラデーション風） -->
  <line x1="36" y1="35" x2="39" y2="35" stroke="#FF80C0" stroke-width="2"/>
  <line x1="36" y1="40" x2="39" y2="40" stroke="#FF9040" stroke-width="2"/>
  <line x1="36" y1="45" x2="39" y2="45" stroke="#FFE040" stroke-width="2"/>
  <line x1="36" y1="50" x2="39" y2="50" stroke="#80E080" stroke-width="2"/>
  <line x1="36" y1="55" x2="39" y2="55" stroke="#40A0FF" stroke-width="2"/>
  <line x1="36" y1="60" x2="39" y2="60" stroke="#C080FF" stroke-width="2"/>
  <line x1="61" y1="35" x2="64" y2="35" stroke="#FF80C0" stroke-width="2"/>
  <line x1="61" y1="40" x2="64" y2="40" stroke="#FF9040" stroke-width="2"/>
  <line x1="61" y1="45" x2="64" y2="45" stroke="#FFE040" stroke-width="2"/>
  <line x1="61" y1="50" x2="64" y2="50" stroke="#80E080" stroke-width="2"/>
  <line x1="61" y1="55" x2="64" y2="55" stroke="#40A0FF" stroke-width="2"/>
  <line x1="61" y1="60" x2="64" y2="60" stroke="#C080FF" stroke-width="2"/>
  <!-- 内部構造（うっすら見える） -->
  <ellipse cx="50" cy="40" rx="8" ry="6" fill="#90C8E0" opacity="0.3"/>
</svg>
