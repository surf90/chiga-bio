<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 警告三角形背景 -->
  <polygon points="50,5 95,90 5,90" fill="#FFF3CD" stroke="#FF8C00" stroke-width="3"/>
  <!-- クラゲの傘（半球形） -->
  <ellipse cx="50" cy="42" rx="24" ry="16" fill="#F08080" stroke="#CC2222" stroke-width="1.5"/>
  <!-- 赤い放射状縞模様 -->
  <line x1="50" y1="27" x2="50" y2="58" stroke="#CC2222" stroke-width="2"/>
  <line x1="36" y1="31" x2="64" y2="53" stroke="#CC2222" stroke-width="2"/>
  <line x1="28" y1="42" x2="72" y2="42" stroke="#CC2222" stroke-width="2"/>
  <line x1="36" y1="53" x2="64" y2="31" stroke="#CC2222" stroke-width="2"/>
  <!-- 傘のクリッピング用オーバーレイ（透明で縞を傘内部に見せる） -->
  <ellipse cx="50" cy="42" rx="24" ry="16" fill="#F08080" opacity="0.3"/>
  <!-- 傘の縁 -->
  <ellipse cx="50" cy="58" rx="24" ry="4" fill="#F08080" stroke="#CC2222" stroke-width="1"/>
  <!-- 長い触手 -->
  <path d="M34,58 Q28,70 22,86" stroke="#CC2222" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M42,60 Q38,72 36,87" stroke="#CC2222" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M58,60 Q62,72 64,87" stroke="#CC2222" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M66,58 Q72,70 78,86" stroke="#CC2222" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 感嘆符 -->
  <text x="50" y="84" text-anchor="middle" font-size="9" font-weight="bold" fill="#CC0000">!</text>
</svg>
