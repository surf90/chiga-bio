<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 安全背景（水色の円） -->
  <circle cx="50" cy="50" r="44" fill="#E0F4FF" stroke="#4AB8E8" stroke-width="2"/>
  <!-- 魚体（細長い紡錘形） -->
  <ellipse cx="52" cy="50" rx="28" ry="9" fill="#7ABCE0" stroke="#3A8AB0" stroke-width="1.5"/>
  <!-- 背面（濃い） -->
  <ellipse cx="52" cy="46" rx="28" ry="5" fill="#3A78A8" opacity="0.6"/>
  <!-- 銀色の帯（体側） -->
  <path d="M26,49 Q52,46 78,49" stroke="#D8E8F8" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- 頭部 -->
  <ellipse cx="24" cy="50" rx="10" ry="9" fill="#7ABCE0" stroke="#3A8AB0" stroke-width="1.5"/>
  <!-- 大きな口（特徴） -->
  <path d="M14,48 Q18,54 24,52" fill="none" stroke="#1A5A88" stroke-width="1.5"/>
  <!-- 目 -->
  <circle cx="20" cy="47" r="2.5" fill="#1A1A1A"/>
  <circle cx="20" cy="47" r="1" fill="#FFFFFF" opacity="0.6"/>
  <!-- 尾びれ -->
  <path d="M80,42 L92,50 L80,58Z" fill="#5A9CC0" stroke="#3A7AA0" stroke-width="1"/>
  <!-- 背びれ -->
  <path d="M45,41 Q52,34 58,41" fill="#5A9CC0" stroke="#3A7AA0" stroke-width="1"/>
</svg>
