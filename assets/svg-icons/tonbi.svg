<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 警告三角形背景 -->
  <polygon points="50,5 95,90 5,90" fill="#FFF3CD" stroke="#FF8C00" stroke-width="3"/>
  <!-- 翼（左） -->
  <path d="M50,42 Q32,30 10,38 Q22,44 50,48" fill="#5A3A18" stroke="#3A2010" stroke-width="1"/>
  <!-- 翼（右） -->
  <path d="M50,42 Q68,30 90,38 Q78,44 50,48" fill="#5A3A18" stroke="#3A2010" stroke-width="1"/>
  <!-- 体 -->
  <ellipse cx="50" cy="50" rx="10" ry="12" fill="#7A5228" stroke="#5A3A18" stroke-width="1.5"/>
  <!-- 頭 -->
  <circle cx="50" cy="36" r="8" fill="#7A5228" stroke="#5A3A18" stroke-width="1.5"/>
  <!-- くちばし -->
  <path d="M50,40 L55,44 L50,46" fill="#E8C050" stroke="#C0A030" stroke-width="0.5"/>
  <!-- 目 -->
  <circle cx="47" cy="34" r="2" fill="#1A1A1A"/>
  <circle cx="47" cy="34" r="0.8" fill="#FFFFFF" opacity="0.6"/>
  <!-- フォーク状尾羽 -->
  <path d="M44,62 L40,78" stroke="#5A3A18" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56,62 L60,78" stroke="#5A3A18" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 爪（警告色） -->
  <path d="M46,62 L42,70 L44,72 L48,65" fill="#FF4400" stroke="#CC2200" stroke-width="0.5"/>
  <!-- 感嘆符 -->
  <text x="50" y="86" text-anchor="middle" font-size="9" font-weight="bold" fill="#CC6600">!</text>
</svg>
