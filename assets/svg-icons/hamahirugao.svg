<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 安全背景（緑の円） -->
  <circle cx="50" cy="50" r="44" fill="#E8F5E0" stroke="#5CB85C" stroke-width="2"/>
  <!-- 蔓 -->
  <path d="M20,80 Q30,60 50,50 Q70,60 80,80" stroke="#5A9A3A" stroke-width="2" fill="none"/>
  <path d="M50,50 Q55,35 50,20" stroke="#5A9A3A" stroke-width="2" fill="none"/>
  <!-- ハート型の葉（腎臓形）×2 -->
  <path d="M35,65 Q28,55 35,50 Q42,45 45,55 Q42,65 35,65Z" fill="#4A8A2A" stroke="#2A6A0A" stroke-width="1"/>
  <path d="M65,65 Q72,55 65,50 Q58,45 55,55 Q58,65 65,65Z" fill="#4A8A2A" stroke="#2A6A0A" stroke-width="1"/>
  <!-- 葉の光沢 -->
  <path d="M36,55 Q34,52 37,51" stroke="#6AB840" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- 花（淡いピンク・朝顔形） -->
  <circle cx="50" cy="25" r="14" fill="#F4A8C0" stroke="#D47898" stroke-width="1.5"/>
  <!-- 花びらの模様 -->
  <line x1="50" y1="12" x2="50" y2="38" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="37" y1="18" x2="63" y2="32" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="37" y1="32" x2="63" y2="18" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <!-- 花の中心 -->
  <circle cx="50" cy="25" r="4" fill="#FFEEAA" stroke="#E8C878" stroke-width="1"/>
</svg>
